<!DOCTYPE html>
<html>
<head>
    <title>News Category Predictor</title>
    <style>
        body { font-family: Arial; max-width: 700px; margin: 40px auto; padding: 20px; }
        textarea { width: 100%; height: 150px; }
        .result { background: #f0f0f0; padding: 15px; margin-top: 20px; border-radius: 8px; }
        .rec { padding: 8px; border-bottom: 1px solid #ccc; }
    </style>
</head>
<body>
    <h2>News Article Category Predictor</h2>
    <form method="POST">
        <textarea name="article" placeholder="Paste news article here...">{{ article_text }}</textarea><br><br>
        <button type="submit">Predict Category</button>
    </form>

    {% if prediction %}
    <div class="result">
        <h3>Predicted Category: {{ prediction }}</h3>
        <h4>Similar Articles:</h4>
        {% for rec in recommendations %}
            <div class="rec">{{ rec }}</div>
        {% endfor %}
    </div>
    {% endif %}
</body>
</html>
